<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Calculator Project </title>
</head>
<body>
    <header>
        <input type="number" name="number-field" id="number-field">
    </header>
    <main>
        <div>
            <button>C</button>
            <button>^</button>
            <button>%</button>
            <button>/</button>
        </div>
        <div>
            <button>9</button>
            <button>8</button>
            <button>7</button>
            <button>*</button>
        </div>
        <div>
            <button>6</button>
            <button>5</button>
            <button>4</button>
            <button>-</button>
        </div>
        <div>
            <button>3</button>
            <button>2</button>
            <button>1</button>
            <button>+</button>
        </div>
        <div>
            <button>Del</button>
            <button>.</button>
            <button>0</button>
            <button>=</button>
        </div>
    </main>
</body>
</html>
